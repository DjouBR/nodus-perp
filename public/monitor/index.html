<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NODUS — Monitor de Frequência Cardíaca</title>

<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/fontawesome.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/duotone.css" />

<style>
.w3-preto-verde { color: #000 !important; background-color: #1aff15 !important }
.w3-verde-preto { color: #1aff15 !important; background-color: #000 !important }
.w3-texto-vermelho { color: #a20025 }
.w3-negrito { font-weight: bold !important; }
.w3-negrito-extra { font-weight: 900; }

body { padding: 0; margin: 0; }

/* ── Animações dos ícones ── */
.fa-heart-pulse, .fa-heartbeat, .fa-percent {
  animation: heartbeat 1.5s ease-in-out infinite;
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  10%, 30%  { transform: scale(1.1); }
  20%, 40%  { transform: scale(1); }
}
.fa-fire { animation: wobble 0.5s infinite; transform-origin: bottom center; }
@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25%       { transform: rotate(-3deg); }
  50%       { transform: rotate(0deg); }
  75%       { transform: rotate(3deg); }
}
.fa-signal-stream-slash, .fa-signal-stream { animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}

.card-wrapper {
  box-sizing: border-box;
  display: inline-block;
  vertical-align: top;
  border-radius: 8px;
}

/* ── Gráfico circular ── */
.flex-wrapper {
  display: flex;
  flex-flow: row nowrap;
  justify-content: center;
  align-items: center;
  gap: 20px;
}
.single-chart {
  width: 88%;
  text-align: center;
  padding: 10px;
  border-radius: 10px;
  transition: background-color 1.5s ease-in-out;
}
.circular-chart { display: block; margin: 10px auto; max-width: 100%; }
.circle-bg { fill: none; stroke-width: 3.8; transition: stroke 1.5s ease-in-out; }
.circle {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  stroke: #000;
  transition: stroke-dasharray 1.5s ease-in-out, stroke 1.5s ease-in-out;
}
.circle-progress {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dasharray 1.5s ease-in-out, stroke 1.5s ease-in-out;
}
.percentage { fill: #000; font-family: sans-serif; font-size: 1em; text-anchor: middle; }
.simbolo    { fill: #000; font-family: sans-serif; font-size: 0.4em; text-anchor: middle; }

/* ── Sessão encerrada ── */
#session-ended-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-size: 3rem;
  font-weight: 900;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
}

/* ── Sessão em breve ── */
#session-soon-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #0a0a0a;
  color: #fff;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
  gap: 20px;
  font-family: sans-serif;
}
#soon-countdown {
  font-size: 6rem;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  color: #1aff15;
  letter-spacing: 0.05em;
  line-height: 1;
}
#soon-session-name {
  font-size: 2.2rem;
  font-weight: 900;
  color: #fff;
}
@keyframes dumbbell-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.08); opacity: 0.85; }
}
#soon-icon {
  font-size: 5rem;
  color: #1aff15;
  animation: dumbbell-pulse 2s ease-in-out infinite;
}
</style>
</head>
<body>

<!-- Overlay: sessão encerrada (token revogado) -->
<div id="session-ended-overlay">
  <div>
    <i class="fa-solid fa-flag-checkered" style="font-size:5rem;margin-bottom:1rem;"></i><br>
    Sessão Encerrada
  </div>
</div>

<!-- Overlay: sessão em breve (status scheduled/pending) -->
<div id="session-soon-overlay">
  <i id="soon-icon" class="fa-solid fa-dumbbell"></i>
  <div id="soon-session-name">—</div>
  <div style="font-size:1.1rem;color:#aaa;">A sessão começa em</div>
  <div id="soon-countdown">00:00:00</div>
  <div style="font-size:0.9rem;color:#555;margin-top:4px;">Esta tela atualizará automaticamente quando a sessão iniciar</div>
</div>

<div id="gridContainer" style="display:flex; flex-wrap:wrap; position:relative;">
  <div id="mainHeader" class="w3-bar" style="height:40px; width:100%; background-color:#f1f1f1; border-bottom:1px solid #ccc; padding:0">
    <div class="w3-bar-item w3-left" style="display:flex; align-items:center;">
      <i class="fas fa-heartbeat w3-xxlarge w3-top w3-left" style="cursor:pointer;"></i>
      <div style="margin-left:45px;">NODUS — <span id="sessionNameHeader">MONITOR DE FREQUÊNCIA CARDÍACA</span></div>
    </div>
    <div id="headerConnectionArea">
      <div id="connectedTemplate" class="w3-bar-item w3-right w3-text-green" style="display:none;">
        <i class="fa-solid fa-signal-stream"></i> Conectado
      </div>
      <div id="disconnectedTemplate" class="w3-bar-item w3-right w3-text-red" style="display:none;">
        <i class="fa-solid fa-signal-stream-slash"></i> Desconectado
      </div>
    </div>
    <div class="w3-bar-item w3-right w3-text-black"><i class="fa-solid fa-expand w3-xlarge"></i></div>
    <div class="w3-bar-item w3-right" style="display:flex;align-items:center;gap:8px;">
      <i class="fa-regular fa-stopwatch w3-xlarge"></i>
      <span class="w3-large w3-negrito" id="sessionTimer">00:00:00</span>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════════════════════
// CONFIGURAÇÃO — lida da URL: /monitor/[token]
// ══════════════════════════════════════════════════════════════

function getTokenFromUrl() {
  const parts = window.location.pathname.split('/').filter(Boolean)
  if (parts.length >= 2 && parts[0] === 'monitor') {
    const candidate = parts[1]
    if (candidate && !candidate.includes('.')) return candidate
  }
  const qs = new URLSearchParams(window.location.search).get('token')
  if (qs && !qs.includes('.')) return qs
  return null
}

const TEMPLATE_RULES = [
  { min: 1,  max: 1,  key: '01_01' },
  { min: 2,  max: 2,  key: '02_02' },
  { min: 3,  max: 4,  key: '03_04' },
  { min: 5,  max: 6,  key: '05_06' },
  { min: 7,  max: 9,  key: '07_09' },
  { min: 10, max: 12, key: '10_12' },
  { min: 13, max: 16, key: '13_16' },
  { min: 17, max: 20, key: '17_20' },
  { min: 21, max: 42, key: '21_42' },
]

function getGridConfig(n) {
  if (n === 1)  return { colunas: 1, linhas: 1, gap: 34, templateKey: '01_01' }
  if (n === 2)  return { colunas: 2, linhas: 1, gap: 32, templateKey: '02_02' }
  if (n <= 4)   return { colunas: 2, linhas: 2, gap: 30, templateKey: '03_04' }
  if (n <= 6)   return { colunas: 3, linhas: 2, gap: 28, templateKey: '05_06' }
  if (n <= 9)   return { colunas: 3, linhas: 3, gap: 26, templateKey: '07_09' }
  if (n <= 12)  return { colunas: 4, linhas: 3, gap: 24, templateKey: '10_12' }
  if (n <= 16)  return { colunas: 4, linhas: 4, gap: 22, templateKey: '13_16' }
  if (n <= 20)  return { colunas: 5, linhas: 4, gap: 20, templateKey: '17_20' }
  if (n <= 25)  return { colunas: 5, linhas: 5, gap: 18, templateKey: '21_42' }
  if (n <= 30)  return { colunas: 6, linhas: 5, gap: 16, templateKey: '21_42' }
  if (n <= 36)  return { colunas: 6, linhas: 6, gap: 14, templateKey: '21_42' }
  return         { colunas: 7, linhas: 6, gap: 12, templateKey: '21_42' }
}

function calcularTamanhoDiv(n) {
  const config = getGridConfig(n)
  const larguraTotalDisponivel = document.documentElement.clientWidth
  const alturaTotalDisponivel  = window.innerHeight
  const { colunas, linhas, gap } = config
  const alturaCabecalho = document.getElementById('mainHeader').offsetHeight || 40

  const larguraDiv = (larguraTotalDisponivel - (colunas + 1) * gap) / colunas
  const alturaDiv  = (alturaTotalDisponivel - ((linhas + 1) * gap) - alturaCabecalho) / linhas

  return { larguraDiv, alturaDiv, config }
}

// ── Helpers de UI ──────────────────────────────────────────────
function showDisconnected() {
  if (sessionSoonActive) return
  document.getElementById('connectedTemplate').style.display    = 'none'
  document.getElementById('disconnectedTemplate').style.display = 'flex'
}
function showConnected() {
  document.getElementById('connectedTemplate').style.display    = 'flex'
  document.getElementById('disconnectedTemplate').style.display = 'none'
}
function showSessionEnded() {
  if (sessionSoonActive) return
  const el = document.getElementById('session-ended-overlay')
  el.style.display = 'flex'
}

// ── Normaliza data para ISO 8601 com fuso UTC ──────────────────
// Garante que strings do MySQL ("2026-04-07 21:00:00") sejam
// interpretadas corretamente em todos os browsers, incluindo Chromium/TV
function parseScheduledAt(raw) {
  if (!raw) return null
  // Se já tem 'T' e termina com 'Z' ou offset (+/-), está ok
  if (/T.*[Z+\-]\d*$/.test(raw)) return new Date(raw)
  // Troca espaço por 'T' e adiciona 'Z' para forçar interpretação UTC
  const iso = String(raw).replace(' ', 'T').replace(/(\.\d+)?$/, 'Z')
  const d = new Date(iso)
  return isNaN(d.getTime()) ? null : d
}

// ── Countdown para sessão em breve ─────────────────────────────
function showSessionSoon(sessionName, scheduledAtRaw) {
  sessionSoonActive = true
  document.getElementById('soon-session-name').textContent = sessionName

  const overlay = document.getElementById('session-soon-overlay')
  overlay.style.display = 'flex'

  const target = parseScheduledAt(scheduledAtRaw)

  // Cancela qualquer countdown anterior antes de criar novo
  if (countdownInterval) {
    clearInterval(countdownInterval)
    countdownInterval = null
  }

  function tick() {
    let diff = 0
    if (target && !isNaN(target.getTime())) {
      diff = Math.max(0, Math.floor((target.getTime() - Date.now()) / 1000))
    }
    const h = Math.floor(diff / 3600)
    const m = Math.floor((diff % 3600) / 60)
    const s = diff % 60
    document.getElementById('soon-countdown').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`

    if (target && diff === 0) {
      clearInterval(countdownInterval)
      countdownInterval = null
      setTimeout(() => window.location.reload(), 2000)
    }
  }

  tick()
  countdownInterval = setInterval(tick, 1000)

  // Polling de 30s para detectar início da sessão — criado apenas uma vez
  if (!soonPollingStarted) {
    soonPollingStarted = true
    setInterval(async () => {
      try {
        const r = await fetch(`/api/monitor/${PAGE_TOKEN}`)
        const j = await r.json()
        if (j.ok && j.sessionStatus === 'active') window.location.reload()
      } catch {}
    }, 30_000)
  }
}

// ══════════════════════════════════════════════════════════════
// WebSocket + Token Polling
// ══════════════════════════════════════════════════════════════
let ws = null

function connect() {
  const wsUrl = `ws://${window.location.hostname}:${ANT_PORT}?sessionId=${SESSION_ID}`
  ws = new WebSocket(wsUrl)

  ws.onopen = () => {
    console.log('[WS] Conectado')
    showConnected()
  }

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data)
      handleWsMessage(data)
    } catch (e) {
      console.error('[WS] Erro ao parsear mensagem:', e)
    }
  }

  ws.onclose = () => {
    console.warn('[WS] Desconectado')
    showDisconnected()
    setTimeout(connect, 3000)
  }

  ws.onerror = (err) => {
    console.error('[WS] Erro:', err)
  }
}

function startTokenPolling() {
  // Não inicia polling de token enquanto "em breve" estiver ativo
  if (sessionSoonActive) return

  setInterval(async () => {
    if (sessionSoonActive) return
    try {
      const res  = await fetch(`/api/monitor/${PAGE_TOKEN}`)
      const json = await res.json()
      if (!res.ok || !json.ok) showSessionEnded()
    } catch {}
  }, 60_000)
}

// ══════════════════════════════════════════════════════════════
// Boot
// ══════════════════════════════════════════════════════════════
async function boot() {
  if (!PAGE_TOKEN) {
    document.getElementById('sessionNameHeader').textContent = 'TOKEN INVÁLIDO'
    showDisconnected()
    return
  }

  try {
    const res  = await fetch(`/api/monitor/${PAGE_TOKEN}`)
    const json = await res.json()

    if (!res.ok || !json.ok) {
      showSessionEnded()
      return
    }

    SESSION_ID   = json.sessionId
    SESSION_NAME = json.sessionName
    ANT_PORT     = json.antServerPort || '3001'

    document.getElementById('sessionNameHeader').textContent = SESSION_NAME
    document.title = `NODUS — ${SESSION_NAME}`

    // Verifica status antes de conectar ao WS
    if (json.sessionStatus === 'scheduled' || json.sessionStatus === 'pending') {
      showSessionSoon(SESSION_NAME, json.scheduledAt)
      return
    }

    if (json.sessionStatus === 'ended' || json.sessionStatus === 'cancelled') {
      showSessionEnded()
      return
    }

    connect()
    startTokenPolling()
  } catch(err) {
    console.error('[Boot] Erro ao validar token:', err)
    showDisconnected()
  }
}

// ══════════════════════════════════════════════════════════════
// Handlers de mensagens WS
// ══════════════════════════════════════════════════════════════
let athleteData = {}
let gridBuilt = false

function handleWsMessage(data) {
  if (data.type === 'session_ended') { showSessionEnded(); return }
  if (data.type === 'athletes_snapshot') { handleSnapshot(data.athletes); return }
  if (data.type === 'athlete_update')    { handleAthleteUpdate(data); return }
}

function handleSnapshot(athletes) {
  athleteData = {}
  athletes.forEach(a => { athleteData[a.deviceId] = a })
  buildGrid(athletes)
}

function handleAthleteUpdate(data) {
  if (!athleteData[data.deviceId]) return
  Object.assign(athleteData[data.deviceId], data)
  updateCard(data.deviceId, data)
}

// ══════════════════════════════════════════════════════════════
// Grid e Cards
// ══════════════════════════════════════════════════════════════
function buildGrid(athletes) {
  const n = athletes.length
  if (n === 0) return

  const { larguraDiv, alturaDiv, config } = calcularTamanhoDiv(n)
  const { gap, templateKey } = config
  const container = document.getElementById('gridContainer')

  // Remove cards anteriores (mantém o header)
  const header = document.getElementById('mainHeader')
  container.innerHTML = ''
  container.appendChild(header)

  container.style.gap     = `${gap}px`
  container.style.padding = `${gap}px`
  container.style.alignContent = 'flex-start'

  athletes.forEach(athlete => {
    const wrapper = document.createElement('div')
    wrapper.className = 'card-wrapper w3-card w3-round-large'
    wrapper.id        = `card-${athlete.deviceId}`
    wrapper.style.width  = `${larguraDiv}px`
    wrapper.style.height = `${alturaDiv}px`
    wrapper.style.overflow = 'hidden'
    wrapper.innerHTML = CARD_TEMPLATES[templateKey] || CARD_TEMPLATES['21_42']

    wrapper.querySelector('[data-name]').textContent     = athlete.name     || '—'
    wrapper.querySelector('[data-hr]').textContent       = athlete.hr       || '—'
    wrapper.querySelector('[data-calories]').textContent = athlete.calories || '0'
    wrapper.querySelector('[data-calories2]').textContent = athlete.calories || '0'
    wrapper.querySelector('[data-points]').textContent   = athlete.points   || '0'

    container.appendChild(wrapper)
  })

  gridBuilt = true
}

function updateCard(deviceId, data) {
  const card = document.getElementById(`card-${deviceId}`)
  if (!card) return

  if (data.hr       !== undefined) { const el = card.querySelector('[data-hr]');       if (el) el.textContent = data.hr }
  if (data.calories !== undefined) {
    const c1 = card.querySelector('[data-calories]');  if (c1) c1.textContent = data.calories
    const c2 = card.querySelector('[data-calories2]'); if (c2) c2.textContent = data.calories
  }
  if (data.points   !== undefined) { const el = card.querySelector('[data-points]');   if (el) el.textContent = data.points }
  if (data.percent  !== undefined) { const el = card.querySelector('[data-percent]');  if (el) el.textContent = data.percent }

  if (data.zone !== undefined) {
    const colorClass = ZONE_TO_COLOR_CLASS[data.zone] || 'w3-grey'
    card.className = card.className.replace(/w3-(grey|light-green|cyan|yellow|orange|red)/g, '').trim()
    card.classList.add(colorClass)
  }
}

// ══════════════════════════════════════════════════════════════
// Timer de sessão
// ══════════════════════════════════════════════════════════════
function startSessionTimer(startedAt) {
  sessionStartTime = startedAt ? new Date(startedAt) : new Date()
  if (timerInterval) clearInterval(timerInterval)
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStartTime.getTime()) / 1000)
    const h = Math.floor(elapsed / 3600)
    const m = Math.floor((elapsed % 3600) / 60)
    const s = elapsed % 60
    document.getElementById('sessionTimer').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
  }, 1000)
}

// ══════════════════════════════════════════════════════════════
boot()
